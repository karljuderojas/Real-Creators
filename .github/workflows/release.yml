name: Release on version bump

# Triggers on every push to master, but the build/release steps only run
# when manifest.json's version field has bumped to a value with no
# matching git tag yet. This means:
#   - Edit any other file → workflow runs but does nothing
#   - Edit manifest.json without changing version → does nothing
#   - Bump manifest.json version to a new value → builds zip, tags, releases

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need all history so we can read existing tags

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r .version manifest.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::manifest.json has no version field"
            exit 1
          fi
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"      >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag_exists
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping build"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${{ steps.version.outputs.tag }} does not exist — will build and release"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build VerifiedPeople.zip
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          mkdir -p dist
          zip -r dist/VerifiedPeople.zip \
            manifest.json \
            background.js \
            content.js \
            content.css \
            popup.html \
            popup.js \
            popup.css \
            help.html \
            icons/

      - name: Create GitHub Release
        if: steps.tag_exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/VerifiedPeople.zip \
            --title "${{ steps.version.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --generate-notes
